name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Install Android SDK
      uses: android-actions/setup-android@v3

    - name: Prepare Web Directory
      run: |
        mkdir www
        cp index.html www/ 2>/dev/null || true
        cp *.css www/ 2>/dev/null || true
        cp *.js www/ 2>/dev/null || true

    - name: Initialize Web to App Conversion
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli
        npx cap init "Calculator App" "com.aaldakhel.calcup" --web-dir=www
        npm install @capacitor/android
        npx cap add android

    - name: Build Android Project
      run: |
        npx cap sync
        cd android && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: calculator-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

