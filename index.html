<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آلة حاسبة احترافية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .calculator { background-color: #1e1e1e; border-radius: 20px; padding: 20px; box-shadow: 0px 10px 25px rgba(0,0,0,0.4); width: 300px; }
        .display { width: 100%; height: 70px; background-color: #2d2d2d; border: none; border-radius: 10px; margin-bottom: 20px; color: #fff; font-size: 32px; text-align: right; padding: 10px; box-sizing: border-box; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        button { height: 60px; border-radius: 12px; border: none; font-size: 22px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .number { background-color: #3a3a3a; color: white; }
        .number:active { background-color: #555; }
        .operator { background-color: #ff9800; color: white; }
        .operator:active { background-color: #e68a00; }
        .clear { background-color: #f44336; color: white; grid-column: span 2; }
        .clear:active { background-color: #d32f2f; }
        .equal { background-color: #4caf50; color: white; grid-column: span 2; }
        .equal:active { background-color: #388e3c; }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="screen" class="display" value="0" readonly>
    <div class="buttons">
        <button class="clear" onclick="clearScreen()">C</button>
        <button class="operator" onclick="appendOperator('/')">÷</button>
        <button class="operator" onclick="appendOperator('*')">×</button>
        
        <button class="number" onclick="appendNumber('7')">7</button>
        <button class="number" onclick="appendNumber('8')">8</button>
        <button class="number" onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="appendOperator('-')">-</button>
        
        <button class="number" onclick="appendNumber('4')">4</button>
        <button class="number" onclick="appendNumber('5')">5</button>
        <button class="number" onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="appendOperator('+')">+</button>
        
        <button class="number" onclick="appendNumber('1')">1</button>
        <button class="number" onclick="appendNumber('2')">2</button>
        <button class="number" onclick="appendNumber('3')">3</button>
        <button class="number" onclick="appendNumber('0')">0</button>
        
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let screen = document.getElementById('screen');
    let resetScreen = false;

    function appendNumber(num) {
        if (screen.value === '0' || resetScreen) {
            screen.value = num;
            resetScreen = false;
        } else {
            screen.value += num;
        }
    }

    function appendOperator(op) {
        screen.value += ' ' + op + ' ';
        resetScreen = false;
    }

    function clearScreen() {
        screen.value = '0';
    }

    function calculate() {
        try {
            let expression = screen.value;
            let result = eval(expression);
            screen.value = result;
            resetScreen = true;
        } catch (error) {
            screen.value = 'خطأ';
            resetScreen = true;
        }
    }
</script>

</body>
</html>
